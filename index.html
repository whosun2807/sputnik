<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<title>Построй свой спутник!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #eef4ff; --purple: #7c5cbf; --purple-light: #ede8f8;
  --yellow-light: #fff8d6; --pink: #ff6eb4; --teal: #00c6b8;
  --orange: #ff8c42; --text: #2d2060; --text-soft: #7a6fa8;
  --white: #ffffff; --shadow: 0 4px 20px rgba(124,92,191,0.13);
  --uz-blue: #0d2a6e;
}
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.blob { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; opacity: 0.18; animation: blobF 8s ease-in-out infinite; }
.blob1 { width: 280px; height: 280px; background: #a78bfa; top: -70px; right: -70px; }
.blob2 { width: 200px; height: 200px; background: #f472b6; bottom: 80px; left: -50px; animation-delay: 2s; }
.blob3 { width: 150px; height: 150px; background: #34d399; top: 40%; right: -30px; animation-delay: 4s; }
@keyframes blobF { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-18px) scale(1.04)} }
.stars-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.star { position: absolute; animation: starA 6s linear infinite; opacity: 0.5; }
@keyframes starA { 0%{transform:scale(1) rotate(0);opacity:0.3} 50%{transform:scale(1.3) rotate(180deg);opacity:0.7} 100%{transform:scale(1) rotate(360deg);opacity:0.3} }
.wrap { position: relative; z-index: 1; max-width: 540px; margin: 0 auto; padding: 1.5rem 1.25rem 5rem; }

/* Header */
.header { text-align: center; margin-bottom: 1.5rem; }
.logo-wrap { margin-bottom: 1rem; }
.logo-wrap img { height: 56px; width: auto; }
.header h1 { font-size: 1.85rem; font-weight: 900; line-height: 1.2; }
.header h1 em { color: var(--purple); font-style: normal; }
.header p { margin-top: 0.4rem; font-size: 0.9rem; color: var(--text-soft); font-weight: 700; }
.header p strong { color: var(--uz-blue); }

/* Progress */
.prog-row { display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 1.5rem; }
.pdot { width: 36px; height: 36px; border-radius: 50%; background: var(--white); border: 3px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 900; color: #ccc; transition: all 0.3s; flex-shrink: 0; }
.pdot.active { background: var(--purple); border-color: var(--purple); color: white; transform: scale(1.2); box-shadow: 0 4px 12px rgba(124,92,191,0.4); }
.pdot.done { background: var(--teal); border-color: var(--teal); color: white; }
.pline { width: 18px; height: 3px; background: #e0e0e0; border-radius: 99px; transition: background 0.3s; flex-shrink: 0; }
.pline.done { background: var(--teal); }

/* Screens */
.screen { display: none; }
.screen.active { display: block; animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes popIn { from{opacity:0;transform:scale(0.93) translateY(14px)} to{opacity:1;transform:scale(1) translateY(0)} }
.card { background: var(--white); border-radius: 24px; padding: 1.75rem 1.5rem; box-shadow: var(--shadow); }
.q-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--purple-light); color: var(--purple); padding: 0.28rem 0.85rem; border-radius: 99px; font-size: 0.78rem; font-weight: 800; margin-bottom: 0.8rem; }
.q-title { font-size: 1.45rem; font-weight: 900; color: var(--text); line-height: 1.25; margin-bottom: 0.3rem; }
.q-hint { font-size: 0.88rem; color: var(--text-soft); font-weight: 700; margin-bottom: 1.2rem; }

/* Options */
.opts { display: flex; flex-direction: column; gap: 0.6rem; }
.opt { display: flex; align-items: center; gap: 0.85rem; padding: 0.85rem 1rem; background: #fafafa; border: 2.5px solid #eee; border-radius: 16px; cursor: pointer; transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); user-select: none; }
.opt:hover { border-color: var(--purple); background: var(--purple-light); transform: scale(1.02); }
.opt.sel { border-color: var(--purple); background: var(--purple-light); transform: scale(1.02); box-shadow: 0 4px 14px rgba(124,92,191,0.18); }
.opt-ico { font-size: 1.9rem; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background: var(--white); border-radius: 13px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: transform 0.2s; }
.opt.sel .opt-ico { transform: scale(1.15) rotate(-6deg); }
.opt-txt strong { display: block; font-size: 0.98rem; font-weight: 900; color: var(--text); margin-bottom: 0.12rem; }
.opt-txt span { font-size: 0.78rem; color: var(--text-soft); font-weight: 700; }

/* Name input */
.name-wrap { margin-top: 0.5rem; }
.name-input { width: 100%; padding: 1rem 1.25rem; font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 800; color: var(--text); background: #fafafa; border: 2.5px solid #eee; border-radius: 16px; outline: none; transition: all 0.2s; }
.name-input:focus { border-color: var(--purple); background: var(--purple-light); box-shadow: 0 4px 14px rgba(124,92,191,0.15); }
.name-input::placeholder { color: #ccc; font-weight: 700; }

/* Buttons */
.btn { display: block; width: 100%; margin-top: 1.2rem; padding: 1rem 1.5rem; background: var(--purple); color: white; border: none; border-radius: 16px; font-family: 'Nunito', sans-serif; font-size: 1.05rem; font-weight: 900; cursor: pointer; transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
.btn:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(124,92,191,0.32); }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.32; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-back { background: transparent; color: var(--text-soft); border: 2px solid #e5e5e5; margin-top: 0.55rem; font-size: 0.93rem; }
.btn-back:hover { background: #f5f5f5; box-shadow: none; color: var(--text); }

/* Language selection */
.lang-title { font-size: 1.5rem; font-weight: 900; text-align: center; margin-bottom: 0.3rem; }
.lang-subtitle { font-size: 0.88rem; color: var(--text-soft); font-weight: 700; text-align: center; margin-bottom: 1.6rem; }
.lang-opts { display: flex; flex-direction: column; gap: 0.75rem; }
.lang-btn {
  display: flex; align-items: center; gap: 1rem;
  padding: 1rem 1.25rem;
  background: #fafafa; border: 2.5px solid #eee; border-radius: 16px;
  cursor: pointer; transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  font-family: 'Nunito', sans-serif; width: 100%; text-align: left;
}
.lang-btn:hover { border-color: var(--purple); background: var(--purple-light); transform: scale(1.02); }
.lang-flag { font-size: 2.2rem; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background: white; border-radius: 13px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.lang-name { font-size: 1.05rem; font-weight: 900; color: var(--text); }
.lang-native { font-size: 0.78rem; font-weight: 700; color: var(--text-soft); }

/* Generating */
.gen-card { background: var(--white); border-radius: 24px; padding: 3rem 1.5rem; text-align: center; box-shadow: var(--shadow); }
.gen-ico { font-size: 5rem; display: block; margin: 0 auto 1rem; animation: genSpin 2s ease-in-out infinite; }
@keyframes genSpin { 0%,100%{transform:scale(1) rotate(-3deg)} 50%{transform:scale(1.08) rotate(3deg)} }
.gen-title { font-size: 1.35rem; font-weight: 900; color: var(--text); margin-bottom: 0.4rem; }
.gen-sub { color: var(--text-soft); font-size: 0.9rem; font-weight: 700; margin-bottom: 1.4rem; }
.dots { display: flex; gap: 8px; justify-content: center; }
.dots span { width: 12px; height: 12px; border-radius: 50%; animation: dotB 1s infinite; }
.dots span:nth-child(1){ background: var(--purple); }
.dots span:nth-child(2){ background: var(--pink); animation-delay: 0.15s; }
.dots span:nth-child(3){ background: var(--teal); animation-delay: 0.3s; }
@keyframes dotB { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

/* Result */
.res-congrats { display: inline-block; background: var(--yellow-light); color: #a07b00; padding: 0.3rem 1rem; border-radius: 99px; font-size: 0.82rem; font-weight: 800; margin-bottom: 0.75rem; }
.sat-vis { text-align: center; margin: 0.75rem 0 1rem; }
.sat-svg-wrap { display: inline-block; animation: satF 3.5s ease-in-out infinite; filter: drop-shadow(0 8px 18px rgba(124,92,191,0.18)); }
@keyframes satF { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-12px) rotate(2deg)} }
.sat-name { font-size: 1.75rem; font-weight: 900; color: var(--text); text-align: center; margin-bottom: 0.2rem; }
.sat-type { display: inline-block; background: var(--purple-light); color: var(--purple); padding: 0.28rem 0.9rem; border-radius: 99px; font-size: 0.75rem; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 1rem; }
.sat-desc { font-size: 0.93rem; line-height: 1.65; color: var(--text-soft); font-weight: 700; background: var(--bg); border-radius: 14px; padding: 0.95rem 1.1rem; margin-bottom: 1rem; }
.specs { display: grid; grid-template-columns: 1fr 1fr; gap: 0.55rem; margin-bottom: 1rem; }
.spec { background: var(--bg); border-radius: 13px; padding: 0.7rem 0.9rem; border: 2px solid #e8e8f0; }
.spec-lbl { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-soft); font-weight: 800; margin-bottom: 0.2rem; }
.spec-val { font-size: 0.88rem; font-weight: 900; color: var(--text); }
.tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.5rem; }
.tag { padding: 0.28rem 0.75rem; border-radius: 99px; font-size: 0.76rem; font-weight: 800; }
.btn-restart { background: linear-gradient(135deg, var(--pink), var(--orange)); margin-top: 1.2rem; }
.btn-restart:hover { box-shadow: 0 6px 20px rgba(255,110,180,0.3); }
.err-box { background: #fff0f0; border: 2px solid #fcc; border-radius: 13px; padding: 0.9rem 1rem; text-align: center; color: #c0392b; font-size: 0.85rem; font-weight: 700; margin-top: 0.75rem; line-height: 1.5; }
.uz-badge { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 1rem; opacity: 0.6; }
.uz-badge img { height: 20px; }
.uz-badge span { font-size: 0.75rem; font-weight: 800; color: var(--uz-blue); }
</style>
</head>

        </button>

          <div class="lang-flag">🇬🇧</div>
          <div><div class="lang-name">English</div><div class="lang-native">English</div></div>
        </button>
      </div>
    </div>
  </div>

  <!-- MAIN GAME (hidden until language chosen) -->
  <div id="mainGame" style="display:none">

    <div class="header">
      <div class="logo-wrap"><img src="Logo.png" alt="Uzcosmos" onerror="this.style.display='none'"></div>

      <p id="headerSub"></p>
    </div>

    <div class="prog-row">
      <div class="pdot" id="d0">1</div><div class="pline" id="l0"></div>

    <div id="s0" class="screen active"><div class="card" id="q0"></div></div>
    <div id="s1" class="screen"><div class="card" id="q1"></div></div>
    <div id="s2" class="screen"><div class="card" id="q2"></div></div>
    <div id="s3" class="screen"><div class="card" id="q3"></div></div>
    <div id="s4" class="screen"><div class="card" id="q4"></div></div>

    <!-- Generating -->
    <div id="sGen" class="screen">
      <div class="gen-card">
        <span class="gen-ico">🛸</span>
        <div class="gen-title" id="genTitle"></div>
        <div class="gen-sub" id="genSub"></div>
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
    </div>

    <!-- Result -->
    <div id="sRes" class="screen">
      <div class="card">
        <div style="text-align:center"><span class="res-congrats" id="resCongratsLbl"></span></div>
        <div class="sat-vis"><div class="sat-svg-wrap" id="satSvg"></div></div>
        <div style="text-align:center">
          <div class="sat-name" id="satName"></div>
          <span class="sat-type" id="satType"></span>
        </div>
        <div class="sat-desc" id="satDesc"></div>
        <div class="specs" id="satSpecs"></div>
        <div class="tags" id="satTags"></div>
        <div class="uz-badge">

        </div>
      </div>
      <div id="errBox"></div>
      <button class="btn btn-restart" id="btnRestart" onclick="reset()"></button>
    </div>

  </div><!-- /mainGame -->
</div>

/* ── State ─────────────────────────────────────────── */
const ans = {};
let currentLang = 'ru';
const TOTAL = 5;

/* ── Stars ─────────────────────────────────────────── */
(function(){
  const w = document.getElementById('starsWrap');
  const em = ['⭐','✨','🌟','★','💫'];
  for(let i = 0; i < 14; i++){
    const s = document.createElement('span');
    s.className = 'star';
    s.innerHTML = em[i % em.length];
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*6}s;animation-duration:${4+Math.random()*4}s;font-size:${13+Math.random()*13}px`;
    w.appendChild(s);
  }
})();

/* ── Language setup ────────────────────────────────── */
function setLang(lang) {
  currentLang = lang;
  const t = T[lang];

  // Show game
  document.getElementById('sLang').classList.remove('active');
  document.getElementById('mainGame').style.display = '';

  // Header
  document.getElementById('headerTitle').innerHTML = t.title;
  document.getElementById('headerSub').innerHTML = t.subtitle;

  // Generating screen
  document.getElementById('genTitle').textContent = t.genTitle;
  document.getElementById('genSub').textContent = t.genSub;

  // Result screen
  document.getElementById('resCongratsLbl').textContent = t.congrats;
  document.getElementById('btnRestart').textContent = t.restart;

  // Render all question screens
  for(let i = 0; i < TOTAL; i++) renderQ(i);

  // Activate first question
  document.getElementById('s0').classList.add('active');
  document.getElementById('d0').classList.add('active');

  window.scrollTo({top:0, behavior:'smooth'});
}

function renderQ(n) {
  const t = T[currentLang];
  const q = t.questions[n];
  const el = document.getElementById('q' + n);

  if(n < 4) {
    const optsHtml = q.opts.map(o =>
      `<div class="opt" data-q="${n}" data-v="${escHtml(o.s)}" onclick="pick(this)">
        <div class="opt-ico">${o.ico}</div>
        <div class="opt-txt"><strong>${escHtml(o.s)}</strong><span>${escHtml(o.d)}</span></div>
      </div>`
    ).join('');

    el.innerHTML = `
      <div class="q-badge">${q.badge}</div>
      <div class="q-title">${q.title}</div>
      <div class="q-hint">${q.hint}</div>
      <div class="opts">${optsHtml}</div>
      <button class="btn" id="b${n}" disabled onclick="go(${n})">${t.fwd}</button>
      ${n > 0 ? `<button class="btn btn-back" onclick="bk(${n})">${t.back}</button>` : ''}
    `;
  } else {
    el.innerHTML = `
      <div class="q-badge">${q.badge}</div>
      <div class="q-title">${q.title}</div>
      <div class="q-hint">${q.hint}</div>
      <div class="name-wrap">
        <input class="name-input" id="nameInput" type="text" maxlength="30"
          placeholder="${escHtml(q.placeholder)}" oninput="onNameInput()">
      </div>
      <button class="btn" id="b4" disabled onclick="go(4)">${q.btnCreate}</button>
      <button class="btn btn-back" onclick="bk(4)">${t.back}</button>
    `;
  }

  // Restore answer if navigating back
  if(ans[n] !== undefined && n < 4) {
    el.querySelectorAll('.opt').forEach(o => {
      if(o.dataset.v === ans[n]) {
        o.classList.add('sel');
        const btn = document.getElementById('b' + n);
        if(btn) btn.disabled = false;
      }
    });
  }
  if(ans[4] !== undefined && n === 4) {
    const ni = document.getElementById('nameInput');
    if(ni) { ni.value = ans[4]; document.getElementById('b4').disabled = false; }
  }
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Quiz logic ────────────────────────────────────── */
function pick(el) {
  const q = el.dataset.q;
  document.querySelectorAll(`[data-q="${q}"]`).forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  ans[q] = el.dataset.v;
  const b = document.getElementById('b' + q);
  if(b) b.disabled = false;
}

function onNameInput() {
  const val = document.getElementById('nameInput').value.trim();
  ans[4] = val;
  document.getElementById('b4').disabled = val.length < 1;
}

function go(q) {
  document.getElementById('s' + q).classList.remove('active');
  const d = document.getElementById('d' + q);
  d.classList.remove('active'); d.classList.add('done'); d.innerHTML = '✓';
  const l = document.getElementById('l' + q); if(l) l.classList.add('done');
  if(q < TOTAL - 1) {
    document.getElementById('s' + (q+1)).classList.add('active');
    document.getElementById('d' + (q+1)).classList.add('active');
  } else {
    document.getElementById('sGen').classList.add('active');
    generate();
  }
  window.scrollTo({top:0, behavior:'smooth'});
}

function bk(q) {
  document.getElementById('s' + q).classList.remove('active');
  document.getElementById('s' + (q-1)).classList.add('active');
  const d = document.getElementById('d' + q); d.classList.remove('active');
  const p = document.getElementById('d' + (q-1));
  p.classList.remove('done'); p.classList.add('active'); p.innerHTML = q;
  const l = document.getElementById('l' + (q-1)); if(l) l.classList.remove('done');
  window.scrollTo({top:0, behavior:'smooth'});
}

function reset() {
  Object.keys(ans).forEach(k => delete ans[k]);
  for(let i = 0; i < TOTAL; i++) {
    const d = document.getElementById('d' + i);
    d.classList.remove('done','active'); d.innerHTML = i+1;
    const l = document.getElementById('l' + i); if(l) l.classList.remove('done');
  }
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('errBox').innerHTML = '';
  document.getElementById('mainGame').style.display = 'none';
  document.getElementById('sLang').classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

function colorFromAnswer(v) {
  const lv = (v||'').toLowerCase();
  if(lv.includes('красн') || lv.includes('qizil') || lv.includes('red'))   return {c1:'#e74c3c', c2:'#ff8c42'};
  if(lv.includes('син')  || lv.includes("ko'k") || lv.includes('blue'))  return {c1:'#2980b9', c2:'#a29bfe'};
  if(lv.includes('золот') || lv.includes('oltin') || lv.includes('gold')) return {c1:'#f39c12', c2:'#fff8d6'};
  if(lv.includes('зелён') || lv.includes('yashil') || lv.includes('green')) return {c1:'#27ae60', c2:'#00c6b8'};
  if(lv.includes('чёрн') || lv.includes('qora') || lv.includes('dark') || lv.includes('black')) return {c1:'#2d2060', c2:'#7c5cbf'};
  return {c1:'#ff6eb4', c2:'#ffcc00'};
}

/* ── Generate ──────────────────────────────────────── */
async function generate() {
  const colorKey = ans[2] || '';
  const colors = colorFromAnswer(colorKey);
  const satName = ans[4] || 'My Satellite';

  try {
    const r = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ answers: ans, lang: currentLang })
    });
    if(!r.ok) throw new Error('server ' + r.status);
    const sat = await r.json();
    if(sat.error) throw new Error(sat.error);
    sat.name = satName;
    sat.color1 = colors.c1;
    sat.color2 = colors.c2;
    showRes(sat);
  } catch(e) {
    console.error(e);
    showFallback(colors, satName);
  }
}

function showRes(sat) {
  document.getElementById('sGen').classList.remove('active');
  document.getElementById('sRes').classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
  document.getElementById('satSvg').innerHTML = svgShape(sat.shape||'cube', sat.color1||'#7c5cbf', sat.color2||'#ffcc00');
  document.getElementById('satName').textContent = sat.name;
  document.getElementById('satType').textContent = sat.type;
  document.getElementById('satDesc').textContent = sat.description;
  const labels = T[currentLang].specLabels;
  document.getElementById('satSpecs').innerHTML = [
    {l:labels[0], v:sat.orbit_height},
    {l:labels[1], v:sat.speed},
    {l:labels[2], v:sat.weight},
    {l:labels[3], v:sat.cameras}
  ].map(s=>`<div class="spec"><div class="spec-lbl">${s.l}</div><div class="spec-val">${s.v||'—'}</div></div>`).join('');
  const ts = ['background:#ede8f8;color:#7c5cbf','background:#e0f9f7;color:#009e92','background:#fff8d6;color:#a07b00','background:#ffe8f5;color:#cc3d90'];
  document.getElementById('satTags').innerHTML = (sat.tags||[]).map((t,i)=>`<span class="tag" style="${ts[i%4]}">🏷 ${t}</span>`).join('');
}

function showFallback(colors, satName) {
  const t = T[currentLang];
  showRes({
    name: satName,
    type: currentLang==='ru' ? 'Страж планеты' : currentLang==='uz' ? "Sayyora qo'riqchisi" : 'Planet Guardian',
    description: currentLang==='ru'
      ? 'Твой спутник уже летит над Землёй на огромной скорости! Он выполняет свою миссию каждую секунду. Это настоящий космический герой — и ты его придумал!'
      : currentLang==='uz'
      ? "Sizning sun'iy yo'ldoshingiz Yer ustida katta tezlikda uchmoqda! U har soniyada o'z missiyasini bajarmoqda. Bu haqiqiy kosmik qahramon — va siz uni o'ylab topdingiz!"
      : "Your satellite is already flying over Earth at incredible speed! It completes its mission every second. This is a true space hero — and you created it!",
    orbit_height: '520 km', speed: '27 600 km/h', weight: '85 kg', cameras: '2 HD',
    tags: currentLang==='ru' ? ['Узбекистан','Космос','Будущее'] : currentLang==='uz' ? ["O'zbekiston","Kosmos","Kelajak"] : ['Uzbekistan','Space','Future'],
    color1: colors.c1, color2: colors.c2, shape: 'cube'
  });
  document.getElementById('errBox').innerHTML = `<div class="err-box">${t.err}</div>`;
}
